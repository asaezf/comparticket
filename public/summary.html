<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ECEAE4">
  <title>comparTICKET</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page">

    <!-- Top bar -->
    <div class="top-bar">
      <button class="top-bar-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="top-bar-title" id="barTitle"></div>
      <button class="top-bar-btn" id="shareTopBtn">
        <svg viewBox="0 0 24 24"><path d="M16 5l-1.42 1.42-1.59-1.59V16h-1.98V4.83L9.42 6.42 8 5l4-4 4 4zm4 5v11c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V10c0-1.11.89-2 2-2h3v2H6v11h12V10h-3V8h3c1.1 0 2 .89 2 2z"/></svg>
      </button>
    </div>

    <!-- Printer Assembly -->
    <div class="printer-assembly">
      <div class="printer-body">
        <div class="printer-brand"><span>compar</span><strong>TICKET</strong></div>
        <div class="printer-right">
          <div class="printer-leds">
            <div class="printer-led on"></div>
            <div class="printer-led idle"></div>
          </div>
        </div>
        <div class="printer-slot-line"></div>
      </div>

      <div class="ticket-wrap">
        <div class="ticket printing" id="ticket">
          <div class="ticket-header">
            <div class="ticket-store" id="ticketTitle"></div>
            <div class="ticket-date" id="ticketDate"></div>
          </div>

          <hr class="dash-sep heavy">

          <!-- Total + Per Person -->
          <div class="data-row">
            <span class="data-label" id="lblTotal"></span>
            <span class="data-value big" id="ticketTotal">€0,00</span>
          </div>
          <div class="data-row">
            <span class="data-label" id="lblPerPerson"></span>
            <span class="data-value" id="perPerson">€0,00</span>
          </div>

          <hr class="dash-sep">

          <!-- Participants progress (hidden if no expected count set) -->
          <div id="participantsProgress" class="participants-progress hidden"></div>

          <!-- Person list — shows name + amount owed -->
          <div id="personList"></div>
        </div>
        <div class="ticket-zigzag"></div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="btn-row" id="actionBtns">
      <button class="btn btn-ghost btn-half" id="refreshBtn">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        <span id="refreshText"></span>
      </button>
      <button class="btn btn-blue btn-half" id="downloadBtn">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <span id="downloadText"></span>
      </button>
    </div>

    <!-- Shareable canvas image (shown after generate) -->
    <div class="share-img-wrap hidden" id="shareImgWrap">
      <canvas id="shareCanvas"></canvas>
    </div>

    <!-- Close bill button -->
    <div class="bottom-sticky" id="bottomArea">
      <button class="btn btn-dark btn-full" id="closeBtn"></button>
    </div>

    <!-- After close — share image -->
    <div class="bottom-sticky hidden" id="closedArea">
      <button class="btn btn-green btn-full" id="shareImgBtn">
        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        <span id="shareImgText"></span>
      </button>
    </div>

    <div class="home-indicator"></div>
    <div class="easter-egg">por alvaro saez ;)</div>
  </div>

  <div class="confetti-wrap hidden" id="confetti"></div>
  <div class="toast hidden" id="toast"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/summary.js"></script>
</body>
</html>
